name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Copy frontend to root
        run: |
          # Copy all files and folders from frontend to root
          cp -r frontend/* .
          # Also copy hidden files if any
          cp -r frontend/. . || true
          
      - name: List files (debug)
        run: |
          echo "Files in root:"
          ls -la
          echo "CSS folder:"
          ls -la css/ || echo "css folder not found"
          echo "JS folder:"
          ls -la js/ || echo "js folder not found"
          
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: false